name: CI — Build Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check (server)
        run: npx tsc --noEmit --project server/tsconfig.json

      - name: TypeScript type-check (shared)
        run: npx tsc --noEmit --project shared/tsconfig.json
