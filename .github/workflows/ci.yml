name: CI — Lint & Build Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build check (shared)
        run: npx tsc --noEmit --project shared/tsconfig.json

      - name: TypeScript build check (server)
        run: npx tsc --noEmit --project server/tsconfig.json

      - name: Server builds successfully
        run: npm run build:server
